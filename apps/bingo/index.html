<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tekphreak's Apologetics Bingo</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        tardis: '#003b6f',
                    },
                    screens: {
                        'xs': '380px',
                    }
                }
            }
        }
    </script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- html2canvas -->
    <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            border-top: 2px solid currentColor;
            border-left: 2px solid currentColor;
        }
        .bingo-cell {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2px;
            word-break: break-word;
            line-height: 1.1;
            border-right: 2px solid currentColor;
            border-bottom: 2px solid currentColor;
        }
    </style>
</head>
<body class="bg-neutral-900 text-white transition-colors duration-300 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Data Pool ---
const DEFAULT_PHRASES = [
    "You just want to sin 😈",
    "Look at the trees! 🌲🌳",
    "The 500 EyeWitness! 👀",
    "You were never a true believer 🚪",
    "Cosmological Argument 🌌",
    "Fine Tuning 🎛️",
    "Objective Morality ⚖️",
    "God of the Gaps 🧩",
    "Pascal's Wager 🎲",
    "Atheism is a religion 🛐",
    "Evolution is just a theory 🧬",
    "Something from nothing? 💥",
    "The Empty Tomb 🪨",
    "Polite but condescending 🧐",
    "C.S. Lewis Quote 🦁",
    "Did you read the BIBLE? 📖",
    "Personal Experience 🙋‍♂️",
    "You're angry at God 😠",
    "Banana fits in hand 🍌✋🏻",
    "Watchmaker Analogy ⌚",
    "Micro vs Macro Evolution 🔬",
    "Absolute Truth 💯",
    "Historical Jesus 📜",
    "Martyrs don't die for lies 💀",
    "Where do you get morals? 🧭",
    "Just have faith 🙏",
    "Science changes, God doesn't ⚓",
    "Fool in his heart 🃏",
    "Defining 'Kind' 🐈🐕",
    "Thermodynamics Law 2 🌡️",
    "Hitler was an atheist 🇩🇪",
    "Stalin was an atheist 🇷🇺",
    "Teleological Argument 🏹",
    "Ontological Argument 🧠",
    "Moral Argument 👩‍⚖️",
    "Transcendental Argument ☁️",
    "Presuppositional Argument 🧱",
    "Argument from Miracles ✨",
    "Argument from Religious Experience 😵",
    "Argument from Reason 💡",
    "Argument from Desire 🍞",
    "Argument from Beauty 🎨",
    "Atheist worship\nScientism🔬",
    "Christological Argument ✝️",
    "Nothing Exploded? 💣",
    "You can't refuse JESUS cause of the IMPLICATION🚤",
    "You need the HOLY SPIRIT to read the Bible 🕊️"
];

        // --- Icons (Updated to accept props for sizing) ---
        const Icons = {
            Moon: (props) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
            Sun: (props) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>,
            Download: (props) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
            Shuffle: (props) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l14.2-12.6c.8-1.1 2-1.7 3.3-1.7H22"/><path d="M2 6h1.4c1.3 0 2.5.6 3.3 1.7l14.2 12.6c.8 1.1 2 1.7 3.3 1.7H22"/></svg>,
            Bookmark: (props) => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>,
            Edit: (props) => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>,
            Mail: (props) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        };

        function App() {
            // Set Default to TRUE for Dark Mode
            const [darkMode, setDarkMode] = useState(true);
            const [title, setTitle] = useState("⚛ Tekphreak's Apologetics ⚛");
            const [squares, setSquares] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const [editingIndex, setEditingIndex] = useState(null);
            
            const cardRef = useRef(null);

            // Handle Dark Mode Body Class
            useEffect(() => {
                if (darkMode) {
                    document.body.classList.add('bg-neutral-900', 'text-white', 'dark');
                    document.body.classList.remove('bg-slate-50', 'text-slate-900');
                } else {
                    document.body.classList.remove('bg-neutral-900', 'text-white', 'dark');
                    document.body.classList.add('bg-slate-50', 'text-slate-900');
                }
            }, [darkMode]);

            // Initial Shuffle
            useEffect(() => {
                shuffleBoard();
            }, []);

            const shuffleBoard = () => {
                let shuffled = [...DEFAULT_PHRASES].sort(() => 0.5 - Math.random());
                // Pick first 24 items
                let selected = shuffled.slice(0, 24);
                // Insert "Out of Context" at index 12 (center of 25)
                selected.splice(12, 0, "Thats\nout of context");
                setSquares(selected);
            };

            const handleSquareChange = (index, newValue) => {
                const newSquares = [...squares];
                newSquares[index] = newValue;
                setSquares(newSquares);
            };

            const handleDownload = async () => {
                if (!cardRef.current) return;
                setIsGenerating(true);
                // Wait for UI to settle
                await new Promise(r => setTimeout(r, 100));

                try {
                    const canvas = await window.html2canvas(cardRef.current, {
                        backgroundColor: darkMode ? '#171717' : '#ffffff',
                        scale: 3,
                        logging: false,
                        useCORS: true,
                        allowTaint: true
                    });
                    
                    const link = document.createElement('a');
                    link.download = `tekphreak-apologetics-bingo-${Date.now()}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                } catch (err) {
                    console.error("Screenshot failed", err);
                    alert("Failed to generate image.");
                }
                setIsGenerating(false);
            };

            return (
                <div className="min-h-screen font-sans flex flex-col">
                    
                    {/* Header */}
                    <header className="p-4 md:p-6 border-b border-slate-200 dark:border-neutral-800 bg-white dark:bg-neutral-900 sticky top-0 z-10 shadow-sm flex flex-col md:flex-row items-center justify-between gap-4">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 flex items-center justify-center text-white rounded bg-tardis shrink-0">
                                <Icons.Bookmark />
                            </div>
                            <h1 className="text-lg md:text-xl font-bold tracking-tight text-slate-900 dark:text-white truncate">Tekphreak's Apologetics Bingo <a href="https://ko-fi.com/tekphreak">☕</a></h1>
                        </div>
                        
                        {/* Action Buttons Container - Desktop & Mobile */}
                        <div className="flex flex-wrap items-center justify-center gap-2 md:gap-4 w-full md:w-auto">
                            <a 
                                href="mailto:tekphreak@me.com?subject=apologetic suggestion%20Text" 
                                className="flex items-center gap-2 text-sm font-medium px-4 py-2 rounded-lg bg-slate-100 dark:bg-neutral-800 hover:bg-slate-200 dark:hover:bg-neutral-700 transition-colors text-tardis dark:text-blue-400"
                            >
                                <Icons.Mail /> <span className="hidden xs:inline">Email Suggestion</span>
                            </a>

                            <button 
                                onClick={shuffleBoard}
                                className="flex items-center gap-2 text-sm font-medium px-4 py-2 rounded-lg bg-slate-100 dark:bg-neutral-800 hover:bg-slate-200 dark:hover:bg-neutral-700 transition-colors text-slate-900 dark:text-white"
                            >
                                <Icons.Shuffle /> <span className="hidden xs:inline">Shuffle</span>
                            </button>

                            <button
                                onClick={handleDownload}
                                disabled={isGenerating}
                                className="flex items-center gap-2 text-sm font-medium px-4 py-2 rounded-lg text-white bg-tardis hover:opacity-90 transition-colors"
                            >
                                {isGenerating ? 'Saving...' : <><Icons.Download /> <span className="hidden xs:inline">Download</span></>}
                            </button>
                            
                            {/* Dark Mode Slider */}
                            <div 
                                onClick={() => setDarkMode(!darkMode)}
                                className={`relative w-14 h-7 rounded-full cursor-pointer transition-colors duration-300 flex items-center border shadow-inner shrink-0 ${darkMode ? 'bg-neutral-800 border-neutral-700' : 'bg-slate-200 border-slate-300'}`}
                                title="Toggle Dark Mode"
                            >
                                <div className="absolute left-1.5 text-yellow-500 z-0">
                                    <Icons.Sun width="14" height="14" />
                                </div>
                                <div className="absolute right-1.5 text-slate-400 z-0">
                                    <Icons.Moon width="14" height="14" />
                                </div>
                                <div 
                                    className={`absolute w-5 h-5 rounded-full bg-white shadow-md transform transition-transform duration-300 z-10 ${darkMode ? 'translate-x-8' : 'translate-x-1'}`}
                                ></div>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-6xl mx-auto p-4 md:p-8 w-full flex flex-col items-center">
                        
                        <div className="flex flex-col items-center justify-center w-full">
                            
                            {/* The Bingo Card */}
                            <div className="flex-1 flex justify-center w-full max-w-[600px]">
                                <div 
                                    ref={cardRef}
                                    className={`relative w-full aspect-[4/5] p-2 sm:p-6 rounded-none shadow-2xl flex flex-col transition-colors duration-300 ${darkMode ? 'bg-neutral-900 text-white' : 'bg-white text-slate-900'}`}
                                >
                                    {/* Card Header */}
                                    <div className="text-center mb-2 sm:mb-4 pb-2 sm:pb-4 border-b-2 sm:border-b-4 border-current">
                                        <h2 className="text-xl sm:text-2xl font-black tracking-tighter uppercase leading-none break-words text-current">
                                            {title}
                                        </h2>
                                        <div className="flex justify-between w-full mt-2 px-1 font-black text-xl sm:text-2xl tracking-[0.2em] opacity-80 text-current">
                                            <span>B</span>
                                            <span>I</span>
                                            <span>N</span>
                                            <span>G</span>
                                            <span>O</span>
                                        </div>
                                    </div>

                                    {/* Card Grid */}
                                    <div className="flex-1 bingo-grid text-current">
                                        {squares.map((text, i) => (
                                            <div 
                                                key={i} 
                                                className={`bingo-cell bg-white dark:bg-neutral-900 relative group text-current ${i === 12 ? 'font-black' : 'font-semibold'} ${i===12 ? '' : 'cursor-pointer hover:bg-black/5 dark:hover:bg-white/10'}`}
                                                onClick={() => i !== 12 && setEditingIndex(i)}
                                            >
                                                {/* Text Display - Scaled down for mobile */}
                                                {editingIndex !== i ? (
                                                    <span className="text-[8px] xs:text-[9px] sm:text-xs lg:text-sm select-none whitespace-pre-wrap px-0.5 sm:px-1">
                                                        {text}
                                                    </span>
                                                ) : (
                                                    /* Edit Input */
                                                    <textarea 
                                                        autoFocus
                                                        value={text}
                                                        onChange={(e) => handleSquareChange(i, e.target.value)}
                                                        onBlur={() => setEditingIndex(null)}
                                                        className="w-full h-full bg-tardis text-white text-[8px] sm:text-xs p-1 text-center resize-none outline-none"
                                                    />
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                    
                                    {/* Footer */}
                                    <div className="mt-2 sm:mt-4 text-center text-[8px] sm:text-[10px] opacity-40 font-mono text-current">
                                        APOLOGETICS BINGO • {new Date().toLocaleDateString()}
                                    </div>
                                </div>
                            </div>
                        </div>

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
